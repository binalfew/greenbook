# /etc/nginx/snippets/au-proxy-headers.conf
# ─────────────────────────────────────────────────────────────────────
# Shared proxy_set_header / timeout block for every per-app server
# block on the AU DMZ reverse proxy. Each `location { ... }` that
# does `proxy_pass` should `include` this file so the same header /
# timeout / buffering policy applies everywhere.
#
# Install:
#   scp docs/deployment/appendix/edge/au-proxy-headers.conf \
#       <admin>@172.16.177.50:~/au-proxy-headers.conf
#   ssh <admin>@172.16.177.50 \
#     'sudo install -d -m 755 /etc/nginx/snippets && \
#      sudo install -m 644 -o root -g root \
#         ~/au-proxy-headers.conf /etc/nginx/snippets/au-proxy-headers.conf && \
#      rm ~/au-proxy-headers.conf'
#
# Reference: deployment guide 12 §13.6.
# ─────────────────────────────────────────────────────────────────────

# HTTP/1.1 + an explicit Connection header are required for keepalive
# to the backend AND for WebSocket / SSE upgrade flows. The
# $connection_upgrade variable is defined by the `map` block in
# /etc/nginx/conf.d/00-au-tls.conf.
proxy_http_version 1.1;
proxy_set_header   Connection         $connection_upgrade;

# Forward the original request envelope so the backend knows who the
# real client is. Backends that trust X-Forwarded-* must be configured
# with the right hop count (greenbook: `app.set("trust proxy", 2)`).
proxy_set_header   Host               $host;
proxy_set_header   X-Real-IP          $remote_addr;
proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto  $scheme;
proxy_set_header   X-Forwarded-Host   $host;
proxy_set_header   Upgrade            $http_upgrade;
proxy_set_header   X-Correlation-Id   $http_x_correlation_id;

# Timeouts — long proxy_read for SSE / streaming SSR.
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    3600s;

# Buffering off matters for streaming (SSE event flushes, React
# Router 7 deferred SSR). Inbound buffering on still helps for
# large form posts without interfering with streaming responses.
proxy_buffering        off;
proxy_request_buffering on;
