# /etc/nginx/sites-available/greenbook.conf — DMZ EDGE PROXY
# ─────────────────────────────────────────────────────────────────────
# greenbook.africanunion.org → 10.111.11.51:80 (greenbook app VM)
#
# This is the per-app server block on the AU DMZ reverse-proxy VM
# (auishqosrarp01). TLS terminates here using the AU wildcard cert
# (/etc/ssl/au/wildcard.africanunion.org.*); proxies plain HTTP
# across the LAN to the app VM's internal nginx, which routes to
# the greenbook docker container on 127.0.0.1:3000.
#
# Shared TLS / rate-limit / security-header config comes from
#   /etc/nginx/conf.d/00-au-tls.conf
#   /etc/nginx/conf.d/01-au-rate-limit.conf
# auto-loaded by nginx before this file. Don't duplicate.
#
# Shared proxy_set_header / timeout snippet comes from
#   /etc/nginx/snippets/au-proxy-headers.conf
# included by every `location { ... proxy_pass ... }` in this file.
#
# Install (two hops — root-owned destination, deployer is no-sudo;
# use the DMZ VM's sudo-capable admin account):
#   scp docs/deployment/appendix/edge/greenbook.conf \
#       <admin>@172.16.177.50:~/greenbook.conf
#   ssh <admin>@172.16.177.50 \
#     'sudo install -m 644 -o root -g root \
#         ~/greenbook.conf /etc/nginx/sites-available/greenbook.conf && \
#      sudo ln -sf /etc/nginx/sites-available/greenbook.conf \
#                  /etc/nginx/sites-enabled/greenbook.conf && \
#      sudo rm -f /etc/nginx/sites-enabled/default && \
#      sudo nginx -t && sudo systemctl reload nginx && \
#      rm ~/greenbook.conf'
#
# Reference: deployment guide 12 §12.6.
# ─────────────────────────────────────────────────────────────────────

upstream greenbook_app {
    server 10.111.11.51:80;
    #  Plain HTTP across the LAN. The app VM's internal nginx
    #  listens on :80, accepts only from this DMZ VM's source IP
    #  (172.16.177.50), and re-proxies to the greenbook container
    #  on 127.0.0.1:3000.

    keepalive 32;
    #  Maintain idle TCP connections to the backend; works with
    #  proxy_http_version 1.1 + Connection upgrade-aware (in the
    #  shared snippets/au-proxy-headers.conf).
}

# ----- HTTP — redirect to HTTPS -------------------------------------
# No ACME challenge handling here. TLS comes from the AU wildcard PFX
# installed at /etc/ssl/au/ via 12 §12.4 — there's no
# /.well-known/acme-challenge/ flow to support.
server {
    listen      80;
    listen      [::]:80;
    server_name greenbook.africanunion.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS — TLS terminator + reverse proxy -----------------------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name greenbook.africanunion.org;

    # AU wildcard cert installed via 12 §12.4. Same paths every app
    # behind this proxy uses — only `server_name` differentiates the
    # vhosts.
    ssl_certificate     /etc/ssl/au/wildcard.africanunion.org.fullchain.pem;
    ssl_certificate_key /etc/ssl/au/wildcard.africanunion.org.key;

    # TLS protocols, ciphers, OCSP stapling, security headers, and
    # the WebSocket upgrade map all come from
    # /etc/nginx/conf.d/00-au-tls.conf — DO NOT duplicate them here.

    # 20 MB upload ceiling. Matches the limit set on the app VM nginx.
    # Adjust if greenbook's largest legitimate upload grows.
    client_max_body_size 20m;

    # Per-vhost logs keep /var/log/nginx/access.log clean and let
    # operators grep / tail per app.
    access_log /var/log/nginx/greenbook-edge.access.log;
    error_log  /var/log/nginx/greenbook-edge.error.log warn;

    # ----- Edge rate limiting --------------------------------------
    # Stricter zone on auth-style endpoints; coarse zone everywhere
    # else. The zones themselves are defined in
    # /etc/nginx/conf.d/01-au-rate-limit.conf.
    #
    # `nodelay` releases up to `burst` requests immediately, then
    # rate-limits the rest. Without nodelay, requests over `rate`
    # are queued — fine for some workloads, painful for browsers
    # that fan out parallel asset requests.

    location ~ ^/(login|forgot-password|api/auth|api/sso) {
        limit_req zone=edge_auth burst=20 nodelay;
        proxy_pass http://greenbook_app;
        include /etc/nginx/snippets/au-proxy-headers.conf;
    }

    location / {
        limit_req zone=edge_general burst=200 nodelay;
        proxy_pass http://greenbook_app;
        include /etc/nginx/snippets/au-proxy-headers.conf;
    }
}
