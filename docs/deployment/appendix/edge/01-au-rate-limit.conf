# /etc/nginx/conf.d/01-au-rate-limit.conf
# ─────────────────────────────────────────────────────────────────────
# AU shared rate-limit zones for the DMZ reverse proxy.
#
# Defines per-IP zones at `http {}` scope. Per-app server blocks
# reference them via `limit_req zone=<zone-name>` inside their
# `location` blocks — the zones themselves stay shared across apps
# so memory accounting is centralised.
#
# Add new zones here when an app needs its own tier (e.g. a public
# API endpoint that allows higher traffic than auth pages, or a
# webhook ingress that needs its own bucket).
#
# Install: same two-hop pattern as 00-au-tls.conf. Reference:
# deployment guide 12 §13.5.
# ─────────────────────────────────────────────────────────────────────

# Coarse per-IP edge limit applied to most traffic. Burst absorbs
# short spikes; rate is the sustained ceiling. 100 r/s lets a single
# IP do legitimate browser activity (page load fans out to dozens of
# parallel asset requests) without tripping; tune down if AU's threat
# model warrants tighter ceilings.
limit_req_zone $binary_remote_addr zone=edge_general:10m rate=100r/s;

# Stricter zone for auth-style endpoints (login, password reset, OTP,
# SSO callback). 20 r/s per IP is generous for legitimate users but
# slows down credential-stuffing scripts substantially. The greenbook
# app VM nginx ALSO limits auth paths (06 §7.3 — greenbook_auth at
# 5 r/s); the two zones stack — edge culls obvious abuse, app VM does
# fine-grained protection.
limit_req_zone $binary_remote_addr zone=edge_auth:1m rate=20r/s;
