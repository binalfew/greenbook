# /etc/nginx/conf.d/00-au-tls.conf
# ─────────────────────────────────────────────────────────────────────
# AU shared TLS terminator settings + security headers + OCSP stapling.
#
# This file is meant for the DMZ reverse-proxy VM only. It defines
# directives at `http {}` scope that every per-app server block on
# the DMZ VM inherits implicitly (nginx auto-loads `conf.d/*.conf`
# before any `sites-enabled/*.conf`). Set TLS / security-header
# policy ONCE here; never per-app.
#
# Filename starts with `00-` so it loads before `sites-enabled/*`
# alphabetically — directives like `map` and `add_header` must be
# defined at http {} scope before any server block that uses them.
#
# Install (two hops — /etc/nginx/conf.d is root-owned, your VM admin
# user has sudo, deployer-style accounts do not):
#   scp docs/deployment/appendix/edge/00-au-tls.conf \
#       <admin>@172.16.177.50:~/00-au-tls.conf
#   ssh <admin>@172.16.177.50 \
#     'sudo install -m 644 -o root -g root \
#         ~/00-au-tls.conf /etc/nginx/conf.d/00-au-tls.conf && \
#      rm ~/00-au-tls.conf && sudo nginx -t && sudo systemctl reload nginx'
#
# Reference: deployment guide 12 §12.5 ("Shared edge configs").
# ─────────────────────────────────────────────────────────────────────

# ----- TLS protocol + cipher policy ---------------------------------
ssl_protocols         TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
# TLS 1.3 cipher order is client-preference by design; once the floor
# is TLS 1.2, server preference for the cipher list doesn't matter.

ssl_session_cache     shared:SSL:10m;
ssl_session_timeout   1d;
ssl_session_tickets   off;
# Session tickets off = forward secrecy preserved even if a ticket
# key leaks. Slight reconnection cost, worth it.

# ----- OCSP stapling ------------------------------------------------
# Nginx fetches the CA's OCSP response and attaches it to the TLS
# handshake; clients don't have to contact the CA themselves.
ssl_stapling          on;
ssl_stapling_verify   on;
resolver              1.1.1.1 9.9.9.9 valid=300s;
resolver_timeout      5s;
# resolver is required for OCSP — nginx needs DNS to find the CA's
# OCSP URL. Replace 1.1.1.1 / 9.9.9.9 with AU's internal recursive
# resolvers if outbound HTTPS to public DNS is policy-blocked. (If
# the DMZ VM can't reach the OCSP responder either, nginx logs
# `ssl_stapling_responder failed` warnings and silently disables
# stapling — config still loads, clients fall back to fetching OCSP
# themselves. Confirm with network ops.)

# ----- Security headers (apply to ALL responses across all apps) ----
# Set ONCE here at the edge. Per-app server blocks should NOT
# duplicate these — nginx merges `add_header always` from http{} into
# every server{}, so duplicating yields doubled headers.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options    "nosniff"                               always;
add_header X-Frame-Options           "DENY"                                  always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;

# ----- WebSocket / SSE upgrade-aware Connection header --------------
# Builds the `Connection` header value based on whether the client
# asked to upgrade. For non-WebSocket / non-SSE requests this becomes
# empty, which is what keepalive needs.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}
