# /etc/nginx/snippets/greenbook-cache-policy.conf
# ─────────────────────────────────────────────────────────────────────
# Greenbook-specific cache routing on the App VM. PER-APP — other
# apps on the same App VM would have their own cache snippet (or none,
# if they don't have a service worker / hashed-asset pattern).
#
# Greenbook (React Router 7 + PWA) has three URL patterns that need
# cache headers different from the catch-all `location /` SSR path:
#   · /sw.js          short cache; browser checks per pageview for SW updates
#   · /assets/*       long cache; content-hashed filenames are immutable
#   · /manifest.json  short cache; PWA metadata changes only on releases
#
# Why per-app and not shared: each block encodes greenbook-specific
# knowledge — React Router 7's hashed-asset path is `/assets/`, the
# service-worker path is `/sw.js`, the manifest is at `/manifest.json`.
# Another app might be Next.js (different paths), Astro, Remix, etc.
# with a different convention.
#
# Each `location` here `include`s the shared
# /etc/nginx/snippets/app-vm-proxy-headers.conf snippet so the
# proxy_set_header block is applied uniformly.
#
# Install (two hops):
#   scp docs/deployment/appendix/app-vm/greenbook-cache-policy.conf \
#       greenbook@10.111.11.51:~/greenbook-cache-policy.conf
#   ssh greenbook@10.111.11.51 \
#     'sudo install -m 644 -o root -g root \
#         ~/greenbook-cache-policy.conf \
#         /etc/nginx/snippets/greenbook-cache-policy.conf && \
#      rm ~/greenbook-cache-policy.conf'
#
# Reference: deployment guide 06 §6.3.2.
# ─────────────────────────────────────────────────────────────────────

# Service worker — short cache, never stale. sw.js is special: browsers
# fetch it on every pageview to check for updates. A long cache would
# strand users on an old version. The origin (/public/sw.js at build
# time) has no cache headers, so nginx sets them here.
location = /sw.js {
    proxy_pass http://greenbook_app;
    include /etc/nginx/snippets/app-vm-proxy-headers.conf;
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    # max-age=0 + must-revalidate = "check for updates on every pageview
    # but allow serving stale bytes while revalidating". Matches the
    # browser-side SW update check greenbook does in app/utils/offline/.
}

# Hashed assets — long cache, immutable. React Router emits client
# assets with content-hashed filenames (e.g. /assets/entry.client-abc123.js)
# that never change for a given hash, so a year-long cache is correct.
# greenbook's server.js already sets this via express.static; the nginx
# rule reinforces it so any intermediary cache (CDN, edge proxy) sees
# it even if the origin ever loses it.
location ^~ /assets/ {
    proxy_pass http://greenbook_app;
    include /etc/nginx/snippets/app-vm-proxy-headers.conf;
    proxy_buffering on;
    # Override the snippet's `proxy_buffering off`. Buffering ON is the
    # right setting for static assets — they're not streaming responses
    # and benefit from nginx caching them in flight.
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    expires 1y;
}

# Manifest + robots — short cache. PWA manifest changes on app updates;
# 1 hour is long enough to absorb traffic spikes without making
# operators wait for browsers to re-fetch after a deploy.
location = /manifest.json {
    proxy_pass http://greenbook_app;
    include /etc/nginx/snippets/app-vm-proxy-headers.conf;
    add_header Cache-Control "public, max-age=3600" always;
}
