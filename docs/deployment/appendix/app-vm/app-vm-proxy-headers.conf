# /etc/nginx/snippets/app-vm-proxy-headers.conf
# ─────────────────────────────────────────────────────────────────────
# Shared proxy_set_header / timeout / buffering block for every
# per-app `location { ... proxy_pass ... }` on this App VM. Each
# `location` that proxies to a docker container should `include` this
# snippet so the same header / timeout / streaming policy applies
# uniformly across all apps.
#
# Install (two hops):
#   scp docs/deployment/appendix/app-vm/app-vm-proxy-headers.conf \
#       greenbook@10.111.11.51:~/app-vm-proxy-headers.conf
#   ssh greenbook@10.111.11.51 \
#     'sudo install -d -m 755 /etc/nginx/snippets && \
#      sudo install -m 644 -o root -g root \
#         ~/app-vm-proxy-headers.conf /etc/nginx/snippets/app-vm-proxy-headers.conf && \
#      rm ~/app-vm-proxy-headers.conf'
#
# Reference: deployment guide 06 §6.3.1.
# ─────────────────────────────────────────────────────────────────────

# HTTP/1.1 + an explicit Connection header are required for keepalive
# to the docker backend AND for WebSocket / SSE upgrade flows. The
# $connection_upgrade variable is defined by the `map` block in
# /etc/nginx/conf.d/00-app-vm-shared.conf.
proxy_http_version 1.1;
proxy_set_header   Connection         $connection_upgrade;

# Forward the original request envelope. Backends that read X-Forwarded-*
# need these in this exact shape.
#
# `app.set("trust proxy", N)` in greenbook's server/app.ts must match
# the topology:
#   · Single-tier (App VM nginx terminates TLS, faces public): N = 1
#   · Two-tier   (DMZ → App VM nginx → Express):                N = 2
# greenbook makes this env-var-driven via TRUSTED_PROXIES — see
# 12 §12.8(d) for the env-file flip during the cutover.
proxy_set_header   Host               $host;
proxy_set_header   X-Real-IP          $remote_addr;
proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto  $scheme;
proxy_set_header   X-Forwarded-Host   $host;
proxy_set_header   Upgrade            $http_upgrade;
proxy_set_header   X-Correlation-Id   $http_x_correlation_id;
# Forward any client-supplied correlation ID; if absent, greenbook's
# correlationMiddleware (server/correlation.js) generates one and
# echoes it back on the response.

# Timeouts — long proxy_read for SSE and React Router 7 streaming SSR.
# Tighten proxy_send_timeout if a misbehaving client keeps a slow-write
# connection open; loosen proxy_read_timeout if you have legitimate
# long-poll / SSE flows that need more than 1 hour of idle silence.
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    3600s;

# NOTE: `proxy_buffering` is NOT set here on purpose — it has different
# correct values per location (off for SSR/SSE catch-all, on by default
# for static assets). nginx forbids re-defining `proxy_buffering` in
# the same location scope after a snippet `include` already set it,
# so it must be set per-location in the per-app server block — see
# greenbook.conf's `location /` and `location ~` blocks for the off
# setting; /assets/ /sw.js /manifest.json inherit nginx's default `on`
# which is correct for static responses.
