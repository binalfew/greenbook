# /etc/nginx/sites-available/greenbook.conf  (App VM)
# ─────────────────────────────────────────────────────────────────────
# Greenbook per-app server block on the App VM nginx.
#
# This is the SINGLE-TIER shape: the App VM nginx terminates TLS itself
# and faces public traffic directly. For the TWO-TIER shape (App VM
# behind a DMZ proxy, see chapter 12), 12 §12.8 documents the diff —
# drop the `listen 443 ssl http2` block, narrow `listen 80` to the DMZ
# source IP via `allow / deny`, drop the `ssl_certificate` lines and
# all `add_header` security headers (those move to the DMZ).
#
# Inherits shared http{}-scope config from
#   /etc/nginx/conf.d/00-app-vm-shared.conf
#     · WebSocket upgrade map ($connection_upgrade)
#     · rate-limit zones (app_general, app_auth)
#
# and shared snippets from
#   /etc/nginx/snippets/app-vm-proxy-headers.conf
#     · proxy_set_header block + timeouts + buffering policy
#   /etc/nginx/snippets/greenbook-cache-policy.conf
#     · /sw.js, /assets/, /manifest.json — greenbook PWA-specific
#
# Install (two hops — root-owned destination, deployer is no-sudo;
# use your sudo-capable admin account):
#   scp docs/deployment/appendix/app-vm/greenbook.conf \
#       greenbook@10.111.11.51:~/greenbook.conf
#   ssh greenbook@10.111.11.51 \
#     'sudo install -m 644 -o root -g root \
#         ~/greenbook.conf /etc/nginx/sites-available/greenbook.conf && \
#      sudo ln -sf /etc/nginx/sites-available/greenbook.conf \
#                  /etc/nginx/sites-enabled/greenbook.conf && \
#      sudo rm -f /etc/nginx/sites-enabled/default && \
#      sudo nginx -t && sudo systemctl reload nginx && \
#      rm ~/greenbook.conf'
#
# Reference: deployment guide 06 §6.3.2.
# ─────────────────────────────────────────────────────────────────────

upstream greenbook_app {
    server 127.0.0.1:3000;
    #  127.0.0.1:3000 is the host-side mapping of the greenbook
    #  container's :3000 (see 07 §7.2.3 ports: line). Loopback only —
    #  the container is never directly reachable off-host.

    keepalive 32;
    #  Maintain idle TCP connections to the backend; works with
    #  proxy_http_version 1.1 + Connection upgrade-aware set in the
    #  shared snippets/app-vm-proxy-headers.conf.
}

# ----- HTTP server: redirect to HTTPS + ACME challenge slot ----------
server {
    listen      80;
    listen      [::]:80;
    server_name greenbook.africanunion.org;

    # ACME HTTP-01 challenge slot. Greenbook's AU wildcard path (§6.4)
    # never uses this — directory just stays empty. Kept for forks that
    # follow Certbot's official guide instead of the AU PFX path.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: 301-redirect to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS server: TLS terminator + reverse proxy ------------------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    #  "listen 443 ssl http2" form works on BOTH nginx 1.24 (Ubuntu
    #  24.04 default) and 1.25.1+ (upstream Nginx repo). 1.25+ prints
    #  a deprecation warning; 1.24 needs this exact form to enable
    #  HTTP/2.

    server_name greenbook.africanunion.org;

    # TLS cert path — the AU wildcard for *.africanunion.org. Same two
    # files serve every per-app server block on this VM. See 06 §6.4 for
    # how the cert lands at these paths (PFX extraction).
    ssl_certificate     /etc/ssl/greenbook/wildcard.africanunion.org.fullchain.pem;
    ssl_certificate_key /etc/ssl/greenbook/wildcard.africanunion.org.key;

    # Modern TLS (Mozilla "intermediate" profile).
    ssl_protocols         TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache     shared:SSL:10m;
    ssl_session_timeout   1d;
    ssl_session_tickets   off;
    # Session tickets off = forward secrecy preserved even if a ticket
    # key leaks. Slight reconnection cost; worth it for a server app.

    # OCSP stapling — nginx fetches CA's revocation response so clients
    # don't have to.
    ssl_stapling          on;
    ssl_stapling_verify   on;
    resolver              1.1.1.1 9.9.9.9 valid=300s;
    resolver_timeout      5s;

    # ----- Security headers (single-tier only) -----------------------
    # In two-tier (chapter 12), these move to the DMZ — the edge sets
    # them once for every app behind the proxy, so per-app server
    # blocks don't need to repeat. Drop these `add_header` lines when
    # converting to two-tier per 12 §12.8.
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options     "nosniff"                              always;
    add_header X-Frame-Options            "DENY"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"      always;

    client_max_body_size 20m;
    # Bigger than nginx default (1 MB); matches the DMZ tier's setting.
    # Adjust to the largest legitimate upload your app accepts.

    access_log /var/log/nginx/greenbook.access.log;
    error_log  /var/log/nginx/greenbook.error.log warn;
    # Per-app logs keep /var/log/nginx/access.log clean and let
    # operators grep / tail per app.

    # ----- Greenbook-specific cache routing --------------------------
    # /sw.js, /assets/*, /manifest.json. See snippet header for why
    # this is per-app rather than shared at conf.d/ scope.
    include /etc/nginx/snippets/greenbook-cache-policy.conf;

    # ----- Catch-all → docker container (SSR + SSE + API) -----------
    # Everything not matched by the cache-policy snippet above lands
    # here: streaming SSR, SSE, regular API calls, etc.
    location / {
        # Edge-tier rate limit on top of greenbook's Express-level
        # three-tier limiter. `app_general` zone defined in
        # /etc/nginx/conf.d/00-app-vm-shared.conf.
        limit_req zone=app_general burst=200 nodelay;
        # Override on auth-style endpoints with the stricter zone.
        # Pattern below matches greenbook's auth routes; adjust per
        # the app's actual paths.
        # (Auth-strict zone applied via the per-app `if` below.)

        proxy_pass http://greenbook_app;
        include /etc/nginx/snippets/app-vm-proxy-headers.conf;
    }

    # ----- Auth-strict rate limit on credential / SSO endpoints -----
    location ~ ^/(login|forgot-password|api/auth|api/sso) {
        limit_req zone=app_auth burst=20 nodelay;
        proxy_pass http://greenbook_app;
        include /etc/nginx/snippets/app-vm-proxy-headers.conf;
    }
}
