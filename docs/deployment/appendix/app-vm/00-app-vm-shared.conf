# /etc/nginx/conf.d/00-app-vm-shared.conf
# ─────────────────────────────────────────────────────────────────────
# Shared http{}-scope directives for every per-app server block on the
# App VM nginx. nginx auto-loads conf.d/*.conf before any
# sites-enabled/*.conf, so per-app sites inherit these implicitly —
# define ONCE here, never per-app.
#
# Filename starts with `00-` so it loads alphabetically before
# sites-enabled/*. Directives like `map` and `limit_req_zone` MUST be
# defined at http{} scope before any server{} block that uses them, or
# nginx fails to start with "map ... is not allowed here" / "unknown
# zone" errors.
#
# Install (two hops — root-owned destination, deployer is no-sudo per
# 09 §9.1; use your sudo-capable admin account on the App VM):
#   scp docs/deployment/appendix/app-vm/00-app-vm-shared.conf \
#       greenbook@10.111.11.51:~/00-app-vm-shared.conf
#   ssh greenbook@10.111.11.51 \
#     'sudo install -m 644 -o root -g root \
#         ~/00-app-vm-shared.conf /etc/nginx/conf.d/00-app-vm-shared.conf && \
#      rm ~/00-app-vm-shared.conf && sudo nginx -t && \
#      sudo systemctl reload nginx'
#
# Reference: deployment guide 06 §6.3.1.
# ─────────────────────────────────────────────────────────────────────

# WebSocket / SSE upgrade-aware Connection header builder. Per-app
# server blocks reference $connection_upgrade in their proxy_set_header
# block (via the shared snippets/app-vm-proxy-headers.conf snippet).
# For non-WebSocket / non-SSE requests this evaluates to empty, which
# is what keepalive needs.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# Shared rate-limit zones. Per-app server blocks reference these by
# zone name with `limit_req zone=app_general burst=N nodelay;` inside
# their `location` blocks. Memory accounting stays centralised here;
# tuning happens in one place.
#
# Add new zones if a specific app needs its own tier (e.g., a public
# API with higher allowable traffic, a webhook ingress with its own
# bucket). Per-app rate-limit policy lives in each <app>.conf;
# zone DEFINITIONS live here.
limit_req_zone $binary_remote_addr zone=app_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=app_auth:1m    rate=5r/s;
